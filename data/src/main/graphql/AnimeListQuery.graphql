query AnimeList(
    $page: PositiveInt!,
    $limit: PositiveInt!,
    $order: OrderEnum,
    $kind: AnimeKindString,
    $status: AnimeStatusString,
    $season: SeasonString,
    $score: Int,
    $duration: DurationString,
    $rating: RatingString,
    $origin: OriginString,
    $genre: String,
    $studio: String,
    $franchise: String,
    $censored: Boolean,
    $mylist: MylistString,
    $search: String
) {
    animes(
        page: $page
        limit: $limit
        order: $order
        kind: $kind
        status: $status
        season: $season
        score: $score
        duration: $duration
        rating: $rating
        origin: $origin
        genre: $genre
        studio: $studio
        franchise: $franchise
        censored: $censored
        mylist: $mylist
        search: $search
    ) {
        id
        name
        russian
        url
        kind
        score
        status
        episodes
        episodesAired
        airedOn {
            date
        }
        releasedOn {
            date
        }
        poster {
            id
            originalUrl
            mainUrl
            previewUrl
        }
    }
}
