query UserRates(
    $page: PositiveInt!,
    $limit: PositiveInt!,
    $mylist: MylistString!,
    $censored: Boolean,
    $order: OrderEnum
) {
    animes(
        page: $page
        limit: $limit
        mylist: $mylist
        censored: $censored
        order: $order
    ) {
        id
        name
        russian
        url
        kind
        score
        status
        episodes
        episodesAired
        airedOn {
            date
        }
        releasedOn {
            date
        }
        poster {
            id
            originalUrl
            mainUrl
            previewUrl
        }
        userRate {
            id
            score
            status
            text
            episodes
            chapters
            volumes
            rewatches
            createdAt
            updatedAt
        }
    }
}
