query UserRatesSearch(
    $page: PositiveInt!,
    $limit: PositiveInt!,
    $mylist: MylistString!,
    $censored: Boolean,
    $order: OrderEnum,
    $search: String,
) {
    animes(
        page: $page
        limit: $limit
        mylist: $mylist
        censored: $censored
        order: $order
        search: $search
    ) {
        id
        name
        russian
        url
        kind
        score
        status
        episodes
        episodesAired
        airedOn {
            date
        }
        releasedOn {
            date
        }
        poster {
            id
            originalUrl
            mainUrl
            previewUrl
        }
        userRate {
            id
            score
            status
            text
            episodes
            chapters
            volumes
            rewatches
            createdAt
            updatedAt
        }
    }
}

query UserRates(
    $page: PositiveInt!,
    $limit: PositiveInt!,
    $status: UserRateStatusEnum!,
    $order: UserRateOrderInputType
) {
    userRates(
        page: $page
        limit: $limit
        status: $status
        order: $order
        targetType: Anime
    ) {
        id
        score
        status
        text
        episodes
        chapters
        volumes
        rewatches
        createdAt
        updatedAt
        anime {
            id
            name
            russian
            url
            kind
            score
            status
            episodes
            episodesAired
            airedOn {
                date
            }
            releasedOn {
                date
            }
            poster {
                id
                originalUrl
                mainUrl
                previewUrl
            }
        }
    }
}
