name: Release Build

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave empty to auto-increment from last)'
        required: false
        default: ''
      skip_tests:
        description: 'Skip tests'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    name: Prepare Build Info
    runs-on: ubuntu-latest
    environment: DailyAnime

    permissions:
      contents: read

    outputs:
      build_number: ${{ steps.build_number.outputs.build_number }}
      version_name: ${{ steps.version_name.outputs.version_name }}
      version_code: ${{ steps.version_code.outputs.version_code }}
      artifact_name: ${{ steps.version_code.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Build Number
        id: build_number
        run: |
          GRADLE_FILE='app/gradle.properties'
          INPUT_BUILD_NUMBER="${{ github.event.inputs.build_number }}"

          CURRENT_BUILD_NUMBER=$(grep -oP 'buildNumber=\K\d+' "${GRADLE_FILE}" || echo "0")
          echo "Current build number in file: ${CURRENT_BUILD_NUMBER}"

          if [ -z "${INPUT_BUILD_NUMBER}" ]; then
            NEW_BUILD_NUMBER=$((CURRENT_BUILD_NUMBER + 1))
            echo "Auto-incremented build number: ${NEW_BUILD_NUMBER}"
          else
            NEW_BUILD_NUMBER="${INPUT_BUILD_NUMBER}"
            echo "Using provided build number: ${NEW_BUILD_NUMBER}"
          fi

          echo "build_number=${NEW_BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Read Version Name
        id: version_name
        run: |
          GRADLE_FILE='app/gradle.properties'
          FULL_VERSION=$(grep -oP 'version=\K\d+\.\d+\.\d+(-[a-f0-9]+)?' "${GRADLE_FILE}")
          VERSION_NAME=$(echo "${FULL_VERSION}" | cut -d'-' -f1)

          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Version name: ${VERSION_NAME}"

      - name: Calculate Version Code
        id: version_code
        run: |
          VERSION_NAME="${{ steps.version_name.outputs.version_name }}"
          BUILD_NUMBER="${{ steps.build_number.outputs.build_number }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_NAME}"
          VERSION_CODE=$((MAJOR * 10000000 + MINOR * 100000 + PATCH * 1000 + BUILD_NUMBER))

          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "artifact_name=${VERSION_NAME}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "Version Code: ${VERSION_CODE}"

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 20
    environment: DailyAnime
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Configuration Files
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/release app/src/debug
          echo "$GOOGLE_SERVICES_JSON" > app/src/release/google-services.json
          echo "$GOOGLE_SERVICES_JSON" > app/src/debug/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Detekt
        run: ./gradlew detekt --no-configuration-cache

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

      - name: Run Screenshot Validation
        run: ./gradlew app:validateDebugScreenshotTest --no-configuration-cache

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [ prepare, quality ]
    if: ${{ always() && needs.prepare.result == 'success' && (needs.quality.result == 'success' || needs.quality.result == 'skipped') }}
    timeout-minutes: 30
    environment: DailyAnime

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 -d > release.jks

      - name: Setup Configuration Files
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/release app/src/debug
          echo "$GOOGLE_SERVICES_JSON" > app/src/release/google-services.json
          echo "$GOOGLE_SERVICES_JSON" > app/src/debug/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release AAB and APK
        env:
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Building with build number: ${BUILD_NUMBER}"
          echo "Expected version code: ${{ needs.prepare.outputs.version_code }}"
          ./gradlew clean bundleRelease assembleRelease --no-configuration-cache --stacktrace

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ needs.prepare.outputs.artifact_name }}.aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ needs.prepare.outputs.artifact_name }}.apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Mapping File
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ needs.prepare.outputs.artifact_name }}.txt
          path: app/build/outputs/mapping/release/mapping.txt

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    needs: [ prepare, build ]
    timeout-minutes: 10
    environment: DailyAnime

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Github Actions"
          git config user.email "githubactions@dezdeqness.com"

      - name: Update Build Number in gradle.properties
        run: |
          GRADLE_FILE='app/gradle.properties'
          NEW_BUILD_NUMBER="${{ needs.prepare.outputs.build_number }}"

          echo "Updating build number to ${NEW_BUILD_NUMBER} in ${GRADLE_FILE}"

          if grep -q "buildNumber=" "${GRADLE_FILE}"; then
            sed -i "s/buildNumber=[0-9]\+/buildNumber=${NEW_BUILD_NUMBER}/" "${GRADLE_FILE}"
          else
            echo "buildNumber=${NEW_BUILD_NUMBER}" >> "${GRADLE_FILE}"
          fi

          git add "${GRADLE_FILE}"

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[CI] Update build number to ${NEW_BUILD_NUMBER}"
            git push origin HEAD
            echo "Build number updated and pushed"
          fi

      - name: Create Release Summary
        run: |
          {
            echo "## 🚀 Release Build Complete"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version Name** | ${{ needs.prepare.outputs.version_name }} |"
            echo "| **Build Number** | ${{ needs.prepare.outputs.build_number }} |"
            echo "| **Version Code** | ${{ needs.prepare.outputs.version_code }} |"
            echo "| **Branch** | ${{ github.ref_name }} |"
            echo ""
            echo "### 📦 Artifacts"
            echo "- AAB: \`app-release-${{ needs.prepare.outputs.artifact_name }}.aab\`"
            echo "- APK: \`app-release-${{ needs.prepare.outputs.artifact_name }}.apk\`"
            echo "- Mapping: \`mapping-${{ needs.prepare.outputs.artifact_name }}.txt\`"
          } >> $GITHUB_STEP_SUMMARY
