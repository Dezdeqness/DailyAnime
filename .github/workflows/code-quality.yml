name: Code Quality Check

on:
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  detekt:
    name: Detekt Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: DailyAnime

    permissions:
      contents: read

    outputs:
      status: ${{ steps.detekt.outcome }}
      violations: ${{ steps.parse.outputs.violations }}
      duration: ${{ steps.timer.outputs.duration }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Configuration Files
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/release app/src/debug
          echo "$GOOGLE_SERVICES_JSON" > app/src/release/google-services.json
          echo "$GOOGLE_SERVICES_JSON" > app/src/debug/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Run Detekt Check
        id: detekt
        continue-on-error: true
        run: ./gradlew detekt

      - name: Parse Detekt Results
        id: parse
        if: always()
        run: |
          VIOLATIONS=0
          if [ -f "build/reports/detekt.xml" ]; then
            VIOLATIONS=$(grep -c '<error ' build/reports/detekt.xml || echo "0")
          fi
          echo "violations=${VIOLATIONS}" >> $GITHUB_OUTPUT
          echo "Detekt violations found: ${VIOLATIONS}"

      - name: Stop timer
        id: timer
        if: always()
        run: |
          START=${{ steps.start.outputs.time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT

      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: |
            **/build/reports/detekt/
            build/reports/detekt.*

      - name: Fail if Detekt failed
        if: steps.detekt.outcome == 'failure'
        run: |
          echo "Detekt check failed with violations"
          exit 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: DailyAnime

    permissions:
      contents: read

    outputs:
      status: ${{ steps.tests.outcome }}
      tests_total: ${{ steps.parse.outputs.tests_total }}
      tests_passed: ${{ steps.parse.outputs.tests_passed }}
      tests_failed: ${{ steps.parse.outputs.tests_failed }}
      tests_skipped: ${{ steps.parse.outputs.tests_skipped }}
      coverage_percent: ${{ steps.coverage.outputs.coverage_percent }}
      covered_classes: ${{ steps.coverage.outputs.covered_classes }}
      total_classes: ${{ steps.coverage.outputs.total_classes }}
      duration: ${{ steps.timer.outputs.duration }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Configuration Files
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/release app/src/debug
          echo "$GOOGLE_SERVICES_JSON" > app/src/release/google-services.json
          echo "$GOOGLE_SERVICES_JSON" > app/src/debug/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Run Unit Tests
        id: tests
        continue-on-error: true
        run: ./gradlew testDebugUnitTest

      - name: Parse Test Results
        id: parse
        if: always()
        run: |
          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0

          for xml in $(find . -path "*/test-results/testDebugUnitTest/*.xml" -name "TEST-*.xml" 2>/dev/null); do
            FILE_TESTS=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo "0")
            FILE_FAILURES=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo "0")
            FILE_ERRORS=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo "0")
            FILE_SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$xml" | head -1 || echo "0")

            TOTAL=$((TOTAL + FILE_TESTS))
            FAILED=$((FAILED + FILE_FAILURES + FILE_ERRORS))
            SKIPPED=$((SKIPPED + FILE_SKIPPED))
          done

          PASSED=$((TOTAL - FAILED - SKIPPED))

          echo "tests_total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "tests_passed=${PASSED}" >> $GITHUB_OUTPUT
          echo "tests_failed=${FAILED}" >> $GITHUB_OUTPUT
          echo "tests_skipped=${SKIPPED}" >> $GITHUB_OUTPUT
          echo "Test results: ${PASSED}/${TOTAL} passed, ${FAILED} failed, ${SKIPPED} skipped"

      - name: Run JaCoCo Coverage Report
        id: jacoco
        if: always()
        continue-on-error: true
        run: ./gradlew jacocoRootReport

      - name: Parse Coverage Results
        id: coverage
        if: always()
        run: |
          COVERAGE="0.00"
          COVERED_CLASSES=0
          TOTAL_CLASSES=0

          JACOCO_XML="build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml"
          if [ -f "$JACOCO_XML" ]; then
            INSTRUCTION_LINE=$(grep -oP '<counter type="INSTRUCTION"[^/]*/>' "$JACOCO_XML" | tail -1)
            if [ -n "$INSTRUCTION_LINE" ]; then
              MISSED=$(echo "$INSTRUCTION_LINE" | grep -oP 'missed="\K[0-9]+')
              COVERED=$(echo "$INSTRUCTION_LINE" | grep -oP 'covered="\K[0-9]+')
              TOTAL_INSTR=$((MISSED + COVERED))
              if [ "$TOTAL_INSTR" -gt 0 ]; then
                COVERAGE=$(awk "BEGIN {printf \"%.2f\", ($COVERED / $TOTAL_INSTR) * 100}")
              fi
            fi

            CLASS_LINE=$(grep -oP '<counter type="CLASS"[^/]*/>' "$JACOCO_XML" | tail -1)
            if [ -n "$CLASS_LINE" ]; then
              COVERED_CLASSES=$(echo "$CLASS_LINE" | grep -oP 'covered="\K[0-9]+')
              MISSED_CLASSES=$(echo "$CLASS_LINE" | grep -oP 'missed="\K[0-9]+')
              TOTAL_CLASSES=$((COVERED_CLASSES + MISSED_CLASSES))
            fi
          fi

          echo "coverage_percent=${COVERAGE}" >> $GITHUB_OUTPUT
          echo "covered_classes=${COVERED_CLASSES}" >> $GITHUB_OUTPUT
          echo "total_classes=${TOTAL_CLASSES}" >> $GITHUB_OUTPUT
          echo "Coverage: ${COVERAGE}% (${COVERED_CLASSES}/${TOTAL_CLASSES} classes)"

      - name: Stop timer
        id: timer
        if: always()
        run: |
          START=${{ steps.start.outputs.time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/test-results/
            **/build/reports/tests/

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build/reports/jacoco/

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "Unit tests failed"
          exit 1

  screenshot-tests:
    name: Screenshot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: DailyAnime

    permissions:
      contents: read

    outputs:
      status: ${{ steps.screenshots.outcome }}
      duration: ${{ steps.timer.outputs.duration }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Configuration Files
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/release app/src/debug
          echo "$GOOGLE_SERVICES_JSON" > app/src/release/google-services.json
          echo "$GOOGLE_SERVICES_JSON" > app/src/debug/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Run Screenshot Validation
        id: screenshots
        continue-on-error: true
        run: ./gradlew app:validateDebugScreenshotTest

      - name: Stop timer
        id: timer
        if: always()
        run: |
          START=${{ steps.start.outputs.time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT

      - name: Fail if screenshot tests failed
        if: steps.screenshots.outcome == 'failure'
        run: |
          echo "Screenshot tests failed"
          exit 1

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [ detekt, unit-tests, screenshot-tests ]
    timeout-minutes: 5

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create Rich Summary
        run: |
          # Status emoji helper
          status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⏭️" ;;
              *) echo "⚠️" ;;
            esac
          }

          DETEKT_STATUS="${{ needs.detekt.result }}"
          TESTS_STATUS="${{ needs.unit-tests.result }}"
          SCREENSHOTS_STATUS="${{ needs.screenshot-tests.result }}"

          DETEKT_ICON=$(status_icon "$DETEKT_STATUS")
          TESTS_ICON=$(status_icon "$TESTS_STATUS")
          SCREENSHOTS_ICON=$(status_icon "$SCREENSHOTS_STATUS")

          # Determine overall status
          if [ "$DETEKT_STATUS" = "success" ] && [ "$TESTS_STATUS" = "success" ] && [ "$SCREENSHOTS_STATUS" = "success" ]; then
            OVERALL="✅ All checks passed"
          else
            OVERALL="❌ Some checks failed"
          fi

          # Test metrics
          TESTS_TOTAL="${{ needs.unit-tests.outputs.tests_total }}"
          TESTS_PASSED="${{ needs.unit-tests.outputs.tests_passed }}"
          TESTS_FAILED="${{ needs.unit-tests.outputs.tests_failed }}"
          TESTS_SKIPPED="${{ needs.unit-tests.outputs.tests_skipped }}"
          COVERAGE="${{ needs.unit-tests.outputs.coverage_percent }}"
          COVERED_CLASSES="${{ needs.unit-tests.outputs.covered_classes }}"
          TOTAL_CLASSES="${{ needs.unit-tests.outputs.total_classes }}"
          DETEKT_VIOLATIONS="${{ needs.detekt.outputs.violations }}"

          # Timing
          DETEKT_DURATION="${{ needs.detekt.outputs.duration }}"
          TESTS_DURATION="${{ needs.unit-tests.outputs.duration }}"
          SCREENSHOTS_DURATION="${{ needs.screenshot-tests.outputs.duration }}"

          # Build summary
          {
            echo "## 🔍 Code Quality Check Results"
            echo ""
            echo "**${OVERALL}**"
            echo ""
            echo "### Checks"
            echo ""
            echo "| Check | Status | Details | Duration |"
            echo "|-------|--------|---------|----------|"
            echo "| Detekt | ${DETEKT_ICON} ${DETEKT_STATUS} | ${DETEKT_VIOLATIONS:-0} violations | ${DETEKT_DURATION:-N/A} |"

            if [ -n "$TESTS_TOTAL" ] && [ "$TESTS_TOTAL" != "0" ]; then
              PASS_RATE=$(awk "BEGIN {printf \"%.1f\", ($TESTS_PASSED / $TESTS_TOTAL) * 100}")
              echo "| Unit Tests | ${TESTS_ICON} ${TESTS_STATUS} | ${TESTS_PASSED}/${TESTS_TOTAL} passed (${PASS_RATE}%), ${TESTS_FAILED} failed, ${TESTS_SKIPPED} skipped | ${TESTS_DURATION:-N/A} |"
            else
              echo "| Unit Tests | ${TESTS_ICON} ${TESTS_STATUS} | No test results available | ${TESTS_DURATION:-N/A} |"
            fi

            echo "| Screenshot Tests | ${SCREENSHOTS_ICON} ${SCREENSHOTS_STATUS} | Validation | ${SCREENSHOTS_DURATION:-N/A} |"
            echo ""

            echo "### 📊 Code Coverage"
            echo ""
            if [ -n "$COVERAGE" ] && [ "$COVERAGE" != "0.00" ]; then
              # Coverage bar visualization
              COVERAGE_INT=${COVERAGE%.*}
              FILLED=$((COVERAGE_INT / 5))
              EMPTY=$((20 - FILLED))
              BAR=$(printf '█%.0s' $(seq 1 $FILLED 2>/dev/null) || true)
              BAR_EMPTY=$(printf '░%.0s' $(seq 1 $EMPTY 2>/dev/null) || true)
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Instruction Coverage | **${COVERAGE}%** ${BAR}${BAR_EMPTY} |"
              echo "| Classes Covered | ${COVERED_CLASSES}/${TOTAL_CLASSES} |"
            else
              echo "> Coverage data not available"
            fi
            echo ""

            echo "### 📋 Details"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Branch** | \`${{ github.head_ref || github.ref_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **PR** | #${{ github.event.pull_request.number }} |"
            echo "| **Triggered by** | ${{ github.actor }} |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: needs.detekt.result == 'failure' || needs.unit-tests.result == 'failure' || needs.screenshot-tests.result == 'failure'
        run: |
          echo "One or more quality checks failed"
          exit 1
